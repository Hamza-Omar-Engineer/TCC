<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المعهد التقاني للحاسوب بدمشق</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <style>
      :root {
        --primary: #6a0dad;
        --bg: #050505;
        --text: #ffffff;
        --glass: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.1);
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
      }

      .blue-theme {
        --primary: #007bff;
      }

      .light-mode {
        --bg: #f0f2f5;
        --text: #1a1a1a;
        --glass: rgba(0, 0, 0, 0.05);
        --border: rgba(0, 0, 0, 0.1);
      }

      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Roboto, sans-serif;
        overflow-x: hidden;
        transition: background 0.5s ease;
      }

      .hidden {
        display: none !important;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 3000;
        background: var(--bg);
      }

      .glow-btn {
        padding: 15px 45px;
        font-size: 1.2rem;
        background: transparent;
        color: white;
        border: 2px solid var(--primary);
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 0 20px var(--primary);
        transition: 0.3s;
      }

      .glow-btn:hover {
        background: var(--primary);
        transform: scale(1.05);
      }

      .login-box {
        background: var(--glass);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        border-radius: 30px;
        padding: 40px;
        width: 380px;
        text-align: center;
        box-shadow: var(--shadow);
      }

      .login-box input {
        width: 100%;
        padding: 15px;
        margin: 12px 0;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        outline: none;
        box-sizing: border-box;
        transition: 0.3s;
      }

      .login-box input:hover,
      .login-box input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 15px var(--primary);
      }

      #sidebar {
        position: fixed;
        right: -320px;
        top: 0;
        width: 280px;
        height: 100%;
        background: var(--glass);
        backdrop-filter: blur(25px);
        border-left: 1px solid var(--border);
        transition: 0.5s;
        z-index: 2000;
        padding: 30px;
        box-sizing: border-box;
      }

      #sidebar.active {
        right: 0;
      }

      #sidebar-toggle {
        position: fixed;
        right: 20px;
        top: 20px;
        width: 45px;
        height: 45px;
        background: var(--primary);
        color: white;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        z-index: 2100;
      }

      .sidebar-btn {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 10px;
        border: none;
        background: var(--primary);
        color: white;
        cursor: pointer;
      }

      .main-content {
        padding: 80px 20px 120px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        max-width: 1200px;
        margin: auto;
      }

      .card {
        background: var(--glass);
        border: 1px solid var(--border);
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        cursor: pointer;
        transition: 0.4s;
      }

      .card:hover {
        transform: translateY(-10px);
        border-color: var(--primary);
      }

      #back-btn {
        background: none;
        border: 1px solid var(--primary);
        color: var(--text);
        padding: 8px 25px;
        border-radius: 20px;
        cursor: pointer;
      }

      .social-dock {
        position: fixed;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--glass);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        padding: 10px 20px;
        border-radius: 50px;
        z-index: 1000;
        display: flex;
        gap: 20px;
      }

      .social-dock a {
        font-size: 1.8rem;
        color: var(--text);
        transition: 0.5s;
      }

      .social-dock a:hover {
        color: var(--clr);
        transform: translateY(-10px);
      }

      /* يظهر فقط بواجهة الدخول */
      .login-footer {
        position: fixed;
        bottom: 20px;
        width: 100%;
        text-align: center;
        font-size: 1rem;
        color: var(--text);
        z-index: 4000;
      }

      /* داخل الموقع */
      .hamza-sign {
        position: fixed;
        bottom: 8px;
        right: 12px;
        font-size: 0.75rem;
        opacity: 0.6;
      }

      @media (max-width: 768px) {
        .login-box {
          width: 90%;
          padding: 30px 20px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .social-dock {
          gap: 15px;
          max-width: 90%;
          flex-wrap: wrap;
        }
      }
    </style>
  </head>

  <body class="dark-mode">
    <!-- Splash -->
    <div id="splash" class="overlay">
      <button onclick="nextStep('splash', 'login')" class="glow-btn">
        Let's Go
      </button>
    </div>

    <!-- Login -->
    <div id="login" class="overlay hidden">
      <div class="login-box">
        <h2>قم بإدخال بياناتك..</h2>

        <input type="text" id="user-name" placeholder="الاسم " />

        <input type="text" id="user-phone" placeholder="رقم الهاتف (اختياري)" />

        <button
          onclick="finishLogin()"
          class="glow-btn"
          style="width: 100%; margin-top: 20px"
        >
          دخول
        </button>
      </div>
    </div>

    <!-- يظهر فقط قبل الدخول -->
    <footer id="login-footer" class="login-footer">
      تم الإنشاء بواسطة: <strong>حمزة عمر الحمزة</strong>
    </footer>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
      <div id="sidebar-toggle" onclick="toggleSidebar()">
        <i class="fas fa-chevron-left"></i>
      </div>

      <aside id="sidebar">
        <h3>الإعدادات</h3>

        <p>لون الهوية:</p>

        <button class="sidebar-btn" onclick="setTheme('purple')">بنفسجي</button>

        <button
          class="sidebar-btn"
          style="background: #007bff"
          onclick="setTheme('blue')"
        >
          أزرق
        </button>

        <p>الوضع:</p>

        <button class="sidebar-btn" id="mode-btn" onclick="toggleMode()">
          الوضع النهاري
        </button>

        <button class="sidebar-btn" onclick="logout()">تسجيل الخروج</button>
      </aside>

      <main class="main-content">
        <header style="text-align: center; margin-bottom: 50px">
          <h1 id="page-title">الرئيسية</h1>

          <button id="back-btn" class="hidden" onclick="goBack()">
            <i class="fas fa-arrow-right"></i>
            رجوع
          </button>
        </header>

        <div id="grid-container" class="grid"></div>
      </main>

      <!-- روابط التواصل -->
      <footer class="social-dock">
        <a
          href="https://whatsapp.com/channel/0029VbBH38t72WToI0bzs31S"
          target="_blank"
          style="--clr: #25d366"
        >
          <i class="fab fa-whatsapp"></i>
        </a>

        <a
          href="https://www.facebook.com/share/g/1D2nfaZwWd/"
          target="_blank"
          style="--clr: #1877f2"
        >
          <i class="fab fa-facebook"></i>
        </a>

        <a
          href="https://www.instagram.com/tcc.hamak"
          target="_blank"
          style="--clr: #e4405f"
        >
          <i class="fab fa-instagram"></i>
        </a>

        <a
          href="https://t.me/+FwcQQ20vhSllYjc8"
          target="_blank"
          style="--clr: #0088cc"
        >
          <i class="fab fa-telegram"></i>
        </a>
      </footer>

      <!-- توقيع صغير داخل الموقع -->
      <div class="hamza-sign">Hamza Omar</div>
    </div>

    <script>
      function nextStep(current, next) {
        document.getElementById(current).classList.add("hidden");
        document.getElementById(next).classList.remove("hidden");
      }

      function toggleSidebar() {
        const sb = document.getElementById("sidebar");
        const icon = document.querySelector("#sidebar-toggle i");

        sb.classList.toggle("active");

        icon.classList.toggle("fa-chevron-left");
        icon.classList.toggle("fa-chevron-right");
      }

      function setTheme(theme) {
        document.body.className =
          theme +
          "-theme " +
          (document.body.classList.contains("light-mode") ? "light-mode" : "");
      }

      function toggleMode() {
        document.body.classList.toggle("light-mode");

        const btn = document.getElementById("mode-btn");
        if (btn) {
          btn.innerText = document.body.classList.contains("light-mode")
            ? "الوضع الليلي"
            : "الوضع النهاري";
        }
      }

      function logout() {
        localStorage.removeItem("studentName");
        localStorage.removeItem("studentPhone");
        location.reload();
      }
      /* =========================
   DATA CLEAN (same structure idea)
========================= */

      const data = {
        "السنة الأولى": {
          برمجيات: {
            content: "مقدمة البرمجة + المتغيرات + الشروط + الحلقات",
          },
          شبكات: {
            content: "IP - DNS - أساسيات الشبكات",
          },
          حواسيب: {
            content: "مقدمة في مكونات الحاسوب",
          },
        },

        "السنة الثانية": {
          برمجيات: {
            content: "هياكل بيانات + OOP",
          },

          شبكات: {
            content: "Routing + Switching",
          },

          حواسيب: {
            "شبكات حاسوبية": {
              "دراسة المادة": {
                type: "categories",
                file: "questions.json",
              },
            },
          },
        },
      };

      /* =========================
   STATE (FIXED)
========================= */

      let stack = [];
      let current = data;

      /* =========================
   CORE RENDER (FIXED)
========================= */

      function render(level, title) {
        current = level;

        const container = document.getElementById("grid-container");

        container.innerHTML = "";

        document.getElementById("page-title").innerText = title;

        // back button
        if (stack.length === 0) {
          document.getElementById("back-btn").classList.add("hidden");
        } else {
          document.getElementById("back-btn").classList.remove("hidden");
        }

        // صفحة محتوى عادية
        if (level.content) {
          container.innerHTML = `
      <div class="card">
        <h3>📘 المحتوى</h3>
        <p>${level.content}</p>
      </div>
    `;
          return;
        }

        // إنشاء الكروت
        Object.keys(level).forEach((key) => {
          const item = level[key];

          const card = document.createElement("div");

          card.className = "card";

          card.innerHTML = `<h3>${key}</h3>`;

          card.onclick = () => {
            stack.push({
              level: level,
              title: title,
            });

            // JSON
            if (item.type === "categories") {
              loadCategories(item.file, key);
              return;
            }

            // CONTENT
            if (item.content) {
              render(item, key);
              return;
            }

            // SUB MENU
            render(item, key);
          };

          container.appendChild(card);
        });
      }

      async function loadCategories(file, title) {
        const response = await fetch(file);

        const jsonData = await response.json();

        const container = document.getElementById("grid-container");

        container.innerHTML = "";

        document.getElementById("page-title").innerText = title;

        // تخزين الصفحة الحالية للرجوع
        stack.push({
          level: current,
          title: title,
        });

        // إنشاء المربعات
        Object.keys(jsonData).forEach((categoryName) => {
          const card = document.createElement("div");

          card.className = "card";

          card.innerHTML = `
      <h3>${categoryName}</h3>
    `;

          card.onclick = () => {
            container.innerHTML = "";

            document.getElementById("page-title").innerText = categoryName;

            jsonData[categoryName].forEach((item, index) => {
              const qCard = document.createElement("div");

              qCard.className = "card";

              qCard.style.cursor = "default";

              qCard.innerHTML = `
          <h3>❓ سؤال ${index + 1}</h3>

          <p style="
            margin-top:20px;
            line-height:2;
            font-weight:bold;
          ">
            ${item.question}
          </p>

          <hr style="
            margin:20px 0;
            opacity:.2;
          ">

          <p style="
            line-height:2;
          ">
            ✅ ${item.answer}
          </p>
        `;

              container.appendChild(qCard);
            });
          };

          container.appendChild(card);
        });
      }
      /* =========================
LOAD QUESTIONS JSON
========================= */

      async function loadQuestions(file, title) {
        const container = document.getElementById("grid-container");

        container.innerHTML = `
    <div class="card">
      <h3>⏳ جاري تحميل الأسئلة...</h3>
    </div>
  `;

        document.getElementById("page-title").innerText = title;

        try {
          const response = await fetch(file);

          if (!response.ok) {
            throw new Error("فشل تحميل ملف JSON");
          }

          const jsonData = await response.json();

          container.innerHTML = "";

          // إذا الملف فاضي
          if (!jsonData.questions || jsonData.questions.length === 0) {
            container.innerHTML = `
        <div class="card">
          <h3>لا يوجد أسئلة حالياً</h3>
        </div>
      `;
            return;
          }

          // عرض الأسئلة
          jsonData.questions.forEach((item, index) => {
            const card = document.createElement("div");

            card.className = "card";

            card.style.cursor = "default";

            card.innerHTML = `
        <h3>❓ سؤال ${index + 1}</h3>

        <p style="
          margin-top:20px;
          font-weight:bold;
          line-height:2;
        ">
          ${item.question}
        </p>

        <hr style="margin:20px 0;opacity:.2">

        <p style="line-height:2">
          ✅ ${item.answer}
        </p>
      `;

            container.appendChild(card);
          });
        } catch (error) {
          container.innerHTML = `
      <div class="card">
        <h3>❌ خطأ بتحميل الأسئلة</h3>

        <p style="margin-top:20px">
          تأكد أن ملف
          <strong>${file}</strong>
          موجود بنفس مجلد الصفحة
        </p>

        <p style="margin-top:15px;color:#ff7777">
          ${error.message}
        </p>
      </div>
    `;

          console.error(error);
        }
      }
      /* =========================
   BACK FIXED
========================= */

      function goBack() {
        const last = stack.pop();

        if (!last) {
          render(data, "الصفحة الرئيسية المعهد");
          return;
        }

        render(last.level, last.title);
      }

      /* =========================
   LOGIN (same UI)
========================= */

      function finishLogin() {
        const nameInput = document.getElementById("user-name").value.trim();

        const parts = nameInput.split(/\s+/);

        if (parts.length !== 1) {
          alert("يرجى إدخال اسمك");
          return;
        }

        localStorage.setItem("studentName", nameInput);

        document.getElementById("login-footer").style.display = "none";

        nextStep("login", "dashboard");

        render(data, "الصفحة الرئيسية المعهد");
      }

      /* =========================
   KEEP YOUR EXISTING FUNCTIONS
   (unchanged UI)
========================= */

      // nextStep, toggleSidebar, setTheme, toggleMode, logout, window.onload remain EXACTLY same
    </script>
  </body>
</html>
